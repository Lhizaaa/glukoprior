<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlukoPrior Mobile — SPK Diabetes Melitus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EEF2F6;--surface:#fff;--surface-2:#F6F9FB;--ink:#15232E;--ink-2:#52677A;--ink-3:#8499A9;
  --line:#E1E8EF;--line-2:#EDF2F6;--teal:#0E7C6B;--teal-d:#0A5C4F;--teal-soft:#E2F2EE;
  --p1:#D64545;--p1-soft:#FBE7E7;--p2:#E08A2B;--p2-soft:#FBEEDD;--p3:#C9A227;--p3-soft:#FAF3DA;
  --p4:#3E9D6E;--p4-soft:#E4F4EC;--blue:#2E6BB0;--blue-soft:#E5EEF8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:
  radial-gradient(circle at 20% 10%,#dfe8f0,transparent 40%),
  radial-gradient(circle at 90% 90%,#e4eef0,transparent 45%),#E4EAF1;
  min-height:100vh;display:grid;place-items:center;padding:28px 16px;color:var(--ink);-webkit-font-smoothing:antialiased}
.mono{font-family:'IBM Plex Mono',monospace;font-feature-settings:"tnum"}
h1,h2,h3,h4{font-family:'Plus Jakarta Sans';letter-spacing:-.02em;line-height:1.2}

/* phone frame */
.phone{width:392px;max-width:100%;height:820px;background:#0C2330;border-radius:46px;padding:11px;
  box-shadow:0 40px 80px -20px rgba(12,35,48,.5),0 0 0 2px rgba(255,255,255,.04) inset;position:relative}
.screen{width:100%;height:100%;background:var(--bg);border-radius:36px;overflow:hidden;position:relative;display:flex;flex-direction:column}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:140px;height:26px;background:#0C2330;border-radius:0 0 18px 18px;z-index:60}
.statusbar{height:46px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 7px;font-size:12.5px;font-weight:600;color:var(--ink);flex-shrink:0;background:var(--surface)}
.statusbar .ico{display:flex;gap:5px;align-items:center}
.statusbar svg{width:15px;height:15px}

/* app bar */
.appbar{background:var(--surface);padding:6px 18px 14px;flex-shrink:0;border-bottom:1px solid var(--line-2);z-index:20}
.appbar .row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.appbar .eyebrow{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--teal);margin-bottom:2px}
.appbar h1{font-size:21px;font-weight:800}
.appbar .sub{font-size:11.5px;color:var(--ink-3);margin-top:3px}
.iconbtn{width:38px;height:38px;border-radius:12px;background:var(--surface-2);border:1px solid var(--line);display:grid;place-items:center;color:var(--ink-2);flex-shrink:0}
.iconbtn svg{width:18px;height:18px}
.avatar{width:38px;height:38px;border-radius:12px;background:linear-gradient(150deg,#13A38B,#0A5C4F);display:grid;place-items:center;color:#fff;font-weight:700;font-size:14px;font-family:'Plus Jakarta Sans';flex-shrink:0}

/* body scroll */
.body{flex:1;overflow-y:auto;padding:16px 16px 96px;scrollbar-width:none}
.body::-webkit-scrollbar{display:none}
.view{display:none;animation:fade .3s}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:0 1px 2px rgba(20,35,46,.04),0 8px 22px rgba(20,35,46,.05)}
.sec-h{display:flex;align-items:center;justify-content:space-between;margin:18px 2px 10px}
.sec-h h3{font-size:14px;font-weight:700}
.sec-h a{font-size:11.5px;color:var(--teal);font-weight:600;text-decoration:none}

/* stat chips */
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 6px 16px rgba(20,35,46,.04)}
.stat .ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;margin-bottom:9px}
.stat .ic svg{width:17px;height:17px}
.stat .v{font-family:'Plus Jakarta Sans';font-size:23px;font-weight:800;line-height:1;letter-spacing:-.03em}
.stat .l{font-size:10.5px;color:var(--ink-2);margin-top:4px;line-height:1.35}

/* patient row */
.prow{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid var(--line-2)}
.prow:last-child{border-bottom:none}
.pav{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px;font-family:'Plus Jakarta Sans';flex-shrink:0}
.rank-badge{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-family:'Plus Jakarta Sans';font-weight:800;font-size:12px;color:#fff;flex-shrink:0}
.prow .nm b{font-size:13.5px;font-weight:600;display:block}
.prow .nm span{font-size:11px;color:var(--ink-3)}
.prow .sc{margin-left:auto;text-align:right}
.prow .sc .vv{font-family:'IBM Plex Mono';font-size:14px;font-weight:600;color:var(--ink)}
.pchip{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:7px;margin-top:3px}
.pdot{width:7px;height:7px;border-radius:50%}

/* winner */
.winner{display:flex;align-items:center;gap:13px;padding:16px;border-radius:18px;color:#fff;
  background:linear-gradient(120deg,var(--teal),#0A5C4F);box-shadow:0 14px 30px rgba(10,92,79,.32)}
.winner .pav{width:46px;height:46px;background:rgba(255,255,255,.18);font-size:16px}
.winner b{font-size:15px;font-family:'Plus Jakarta Sans';font-weight:800;display:block}
.winner span{font-size:11px;opacity:.9}
.winner .v{margin-left:auto;text-align:right}
.winner .v .big{font-family:'Plus Jakarta Sans';font-size:26px;font-weight:800;line-height:1}
.winner .v small{font-size:10px;opacity:.85}

/* segmented */
.seg{display:flex;background:var(--surface-2);border:1px solid var(--line);border-radius:13px;padding:3px;gap:3px;margin-bottom:14px}
.seg button{flex:1;font-family:'Inter';font-size:12.5px;font-weight:600;padding:9px;border:none;border-radius:10px;background:none;color:var(--ink-2)}
.seg button.on{background:var(--surface);color:var(--teal-d);box-shadow:0 2px 8px rgba(20,35,46,.1)}

/* edit list */
.editrow{padding:13px 14px;border-bottom:1px solid var(--line-2)}
.editrow:last-child{border-bottom:none}
.editrow .top{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.editrow .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fld label{font-size:10px;font-weight:600;color:var(--ink-3);display:block;margin-bottom:3px}
.fld input{width:100%;font-family:'IBM Plex Mono';font-size:13px;border:1px solid var(--line);border-radius:9px;padding:8px;color:var(--ink);background:var(--surface-2)}
.fld input:focus{outline:none;border-color:var(--teal);background:#fff;box-shadow:0 0 0 3px rgba(14,124,107,.1)}

/* formula card */
.formula{background:var(--surface-2);border:1px dashed var(--line);border-radius:11px;padding:11px 13px;font-family:'IBM Plex Mono';font-size:11.5px;color:var(--ink);margin-bottom:11px;line-height:1.6}
.formula .c{color:var(--teal);font-weight:600}
.steplead{font-size:11.5px;font-weight:700;color:var(--ink);margin:4px 0 9px;display:flex;align-items:center;gap:8px}
.steplead .n{width:20px;height:20px;border-radius:6px;background:var(--teal-soft);color:var(--teal-d);display:grid;place-items:center;font-family:'Plus Jakarta Sans';font-weight:800;font-size:11px}

/* mini matrix */
.mtbl{width:100%;border-collapse:collapse;font-size:11px}
.mtbl th{font-size:9.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-3);font-weight:600;padding:7px 5px;border-bottom:1px solid var(--line);text-align:right;background:var(--surface-2)}
.mtbl th:first-child{text-align:left}
.mtbl td{padding:8px 5px;border-bottom:1px solid var(--line-2);text-align:right;font-family:'IBM Plex Mono';font-size:11px}
.mtbl td:first-child{text-align:left;font-family:'Plus Jakarta Sans';font-weight:700;font-size:11.5px}
.mtbl tr:last-child td{border-bottom:none}

/* weight slider */
.wrow{padding:13px 2px;border-bottom:1px solid var(--line-2)}
.wrow:last-child{border-bottom:none}
.wrow .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.tag{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:20px}
.tag.b{background:var(--teal-soft);color:var(--teal-d)}.tag.c{background:var(--blue-soft);color:var(--blue)}
input[type=range]{width:100%;accent-color:var(--teal);margin-top:4px}

.note{display:flex;gap:9px;background:var(--p2-soft);border:1px solid #F0D9B5;border-radius:13px;padding:12px;font-size:11px;color:#7A5418;line-height:1.5;margin-bottom:14px}
.note svg{width:16px;height:16px;flex-shrink:0;color:var(--p2);margin-top:1px}

/* bottom nav */
.tabbar{position:absolute;bottom:0;left:0;right:0;height:74px;background:rgba(255,255,255,.92);
  backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;justify-content:space-around;
  align-items:flex-start;padding-top:11px;z-index:50;border-radius:0 0 36px 36px}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:var(--ink-3);font-family:'Inter';font-size:9.5px;font-weight:600;flex:1;cursor:pointer}
.tab svg{width:21px;height:21px}
.tab.on{color:var(--teal)}
.fab{position:absolute;top:-26px;left:50%;transform:translateX(-50%);width:52px;height:52px;border-radius:50%;
  background:linear-gradient(150deg,#13A38B,#0A5C4F);box-shadow:0 10px 24px rgba(14,124,107,.45);display:grid;place-items:center;border:4px solid var(--bg)}
.fab svg{width:23px;height:23px;color:#fff}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="screen">
    <div class="statusbar">
      <span>09:41</span>
      <span class="ico">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 17h2v4H2zM7 12h2v9H7zM12 8h2v13h-2zM17 4h2v17h-2z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4C7 4 2.7 6 0 9l12 15L24 9c-2.7-3-7-5-12-5z"/></svg>
        <svg viewBox="0 0 26 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="6" width="20" height="12" rx="3"/><rect x="3" y="8" width="14" height="8" rx="1.5" fill="currentColor"/><path d="M23 10v4" stroke-linecap="round"/></svg>
      </span>
    </div>

    <!-- APP BAR -->
    <div class="appbar">
      <div class="row">
        <div>
          <div class="eyebrow" id="abEyebrow">Program Prolanis</div>
          <h1 id="abTitle">Prioritas Pasien</h1>
          <div class="sub" id="abSub">Diabetes Melitus Tipe 2</div>
        </div>
        <div class="avatar" id="abAvatar">RS</div>
      </div>
      <div id="abExtra"></div>
    </div>

    <!-- BODY -->
    <div class="body" id="body">

      <!-- DASHBOARD -->
      <div class="view on" id="v-dash">
        <div class="statgrid" id="mStats" style="margin-top:2px"></div>
        <div class="sec-h"><h3>Prioritas Teratas</h3><a onclick="mgo('hasil')">Lihat semua</a></div>
        <div class="card" id="mDashRank"></div>
        <div class="sec-h"><h3>Tingkat Prioritas</h3></div>
        <div class="card" style="padding:13px 15px;display:flex;flex-wrap:wrap;gap:11px 16px">
          <span style="font-size:11px;color:var(--ink-2);display:flex;align-items:center;gap:6px"><i class="pdot" style="background:var(--p1)"></i>Sangat Tinggi</span>
          <span style="font-size:11px;color:var(--ink-2);display:flex;align-items:center;gap:6px"><i class="pdot" style="background:var(--p2)"></i>Tinggi</span>
          <span style="font-size:11px;color:var(--ink-2);display:flex;align-items:center;gap:6px"><i class="pdot" style="background:var(--p3)"></i>Sedang</span>
          <span style="font-size:11px;color:var(--ink-2);display:flex;align-items:center;gap:6px"><i class="pdot" style="background:var(--p4)"></i>Rendah</span>
        </div>
      </div>

      <!-- DATA -->
      <div class="view" id="v-data">
        <div class="note">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
          <div>Ubah nilai kriteria — ranking SAW &amp; TOPSIS dihitung ulang otomatis. C1–C4 benefit, C5 (kepatuhan) cost.</div>
        </div>
        <div class="card" id="mEdit"></div>
        <button onclick="addPatientM()" style="width:100%;margin-top:13px;font-family:'Inter';font-size:13.5px;font-weight:600;border:none;border-radius:13px;padding:13px;background:var(--teal);color:#fff;box-shadow:0 6px 16px rgba(14,124,107,.3);display:flex;align-items:center;justify-content:center;gap:8px">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>Tambah Pasien
        </button>
      </div>

      <!-- KRITERIA -->
      <div class="view" id="v-krit">
        <div class="card" style="padding:6px 15px" id="mKrit"></div>
      </div>

      <!-- HASIL -->
      <div class="view" id="v-hasil">
        <div class="seg" id="mSeg">
          <button class="on" data-m="saw">SAW</button>
          <button data-m="topsis">TOPSIS</button>
        </div>
        <div id="mWinner" style="margin-bottom:14px"></div>
        <div id="mSteps"></div>
      </div>

      <!-- BANDING -->
      <div class="view" id="v-banding">
        <div id="mCompare"></div>
      </div>

    </div>

    <!-- BOTTOM NAV -->
    <div class="tabbar" id="tabbar">
      <button class="tab on" data-pg="dash"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>Beranda</button>
      <button class="tab" data-pg="data"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Pasien</button>
      <div style="flex:1;position:relative"><button class="fab" onclick="mgo('hasil')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg></button></div>
      <button class="tab" data-pg="krit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></svg>Bobot</button>
      <button class="tab" data-pg="banding"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18"/></svg>Banding</button>
    </div>
  </div>
</div>

<script>
/* ===== shared engine (identik dengan versi desktop) ===== */
const DEFAULT_PATIENTS=[
  {id:'A1',name:'Ny. Siti Aminah',meta:'58 th · RM 0421',color:'#D64545',v:[7.8,160,140,2,3]},
  {id:'A2',name:'Tn. Budi Santoso',meta:'64 th · RM 0188',color:'#E08A2B',v:[10.2,220,160,3,2]},
  {id:'A3',name:'Tn. Andi Wijaya',meta:'47 th · RM 0533',color:'#3E9D6E',v:[7.2,145,148,1,5]},
  {id:'A4',name:'Ny. Rina Hartati',meta:'61 th · RM 0307',color:'#2E6BB0',v:[9.8,200,145,4,3]},
  {id:'A5',name:'Tn. Joko Prasetyo',meta:'69 th · RM 0299',color:'#7A52B0',v:[11.5,250,155,2,1]},
];
const CRIT=[
  {code:'C1',name:'HbA1c',desc:'gula darah 3 bulan',unit:'%',w:0.30,type:'benefit'},
  {code:'C2',name:'Gula Darah Puasa',desc:'GDP',unit:'mg/dL',w:0.20,type:'benefit'},
  {code:'C3',name:'Tekanan Sistolik',desc:'komorbid hipertensi',unit:'mmHg',w:0.15,type:'benefit'},
  {code:'C4',name:'Jumlah Komplikasi',desc:'retinopati, nefropati',unit:'kondisi',w:0.25,type:'benefit'},
  {code:'C5',name:'Tingkat Kepatuhan',desc:'1 buruk … 5 patuh',unit:'skala',w:0.10,type:'cost'},
];
let patients=JSON.parse(JSON.stringify(DEFAULT_PATIENTS));
const W=()=>{const s=CRIT.reduce((a,c)=>a+c.w,0)||1;return CRIT.map(c=>c.w/s)};
const MX=()=>patients.map(p=>p.v.slice());
function SAW(){const X=MX(),w=W(),n=patients.length,m=CRIT.length;const R=patients.map(()=>[]);
  for(let j=0;j<m;j++){const c=X.map(r=>r[j]),mx=Math.max(...c),mn=Math.min(...c);for(let i=0;i<n;i++)R[i][j]=CRIT[j].type=='benefit'?X[i][j]/mx:mn/X[i][j];}
  return{R,V:R.map(r=>r.reduce((a,v,j)=>a+v*w[j],0)),w};}
function TOPSIS(){const X=MX(),w=W(),m=CRIT.length;const d=[];for(let j=0;j<m;j++)d[j]=Math.sqrt(X.reduce((a,r)=>a+r[j]*r[j],0));
  const R=X.map(r=>r.map((v,j)=>v/d[j])),Y=R.map(r=>r.map((v,j)=>v*w[j]));
  const Ap=[],Am=[];for(let j=0;j<m;j++){const c=Y.map(r=>r[j]),mx=Math.max(...c),mn=Math.min(...c);if(CRIT[j].type=='benefit'){Ap[j]=mx;Am[j]=mn}else{Ap[j]=mn;Am[j]=mx}}
  const Dp=Y.map(r=>Math.sqrt(r.reduce((a,v,j)=>a+(v-Ap[j])**2,0))),Dm=Y.map(r=>Math.sqrt(r.reduce((a,v,j)=>a+(v-Am[j])**2,0)));
  return{R,Y,Ap,Am,Dp,Dm,V:Dp.map((_,i)=>Dm[i]/(Dp[i]+Dm[i])),w};}
const rank=V=>V.map((v,i)=>({i,v})).sort((a,b)=>b.v-a.v);
function plevel(idx,t){const q=idx/Math.max(t-1,1);if(q<=.2)return{l:'Sangat Tinggi',c:'var(--p1)',s:'var(--p1-soft)'};if(q<=.45)return{l:'Tinggi',c:'var(--p2)',s:'var(--p2-soft)'};if(q<=.7)return{l:'Sedang',c:'var(--p3)',s:'var(--p3-soft)'};return{l:'Rendah',c:'var(--p4)',s:'var(--p4-soft)'};}
const ini=n=>n.replace(/^(Ny\.|Tn\.)\s*/,'').split(' ').slice(0,2).map(x=>x[0]).join('');
const f2=x=>Number(x).toLocaleString('id-ID',{maximumFractionDigits:2});
const f4=x=>Number(x).toLocaleString('id-ID',{minimumFractionDigits:4,maximumFractionDigits:4});

const iU='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>';
const iA='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10.3 3.9L1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L13.7 3.9a2 2 0 00-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>';
const iD='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2.7S5.5 9 5.5 14a6.5 6.5 0 0013 0C18.5 9 12 2.7 12 2.7z"/></svg>';
const iC='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 11.1V12a10 10 0 11-5.9-9.1"/><path d="M22 4L12 14l-3-3"/></svg>';

/* ===== renders ===== */
function rDash(){
  const t=TOPSIS(),rk=rank(t.V);
  const urgent=rk.filter((r,i)=>i/(patients.length-1)<=.45).length;
  const avgH=(patients.reduce((a,p)=>a+p.v[0],0)/patients.length).toFixed(1);
  document.getElementById('mStats').innerHTML=`
   ${sc('var(--teal)','var(--teal-soft)',iU,patients.length,'Total pasien terdaftar')}
   ${sc('var(--p1)','var(--p1-soft)',iA,urgent,'Prioritas tinggi')}
   ${sc('var(--blue)','var(--blue-soft)',iD,avgH+'%','Rata-rata HbA1c')}
   ${sc('var(--p4)','var(--p4-soft)',iC,rk[0].v.toFixed(2),'Skor tertinggi')}`;
  document.getElementById('mDashRank').innerHTML=rk.map((r,idx)=>{const p=patients[r.i],pl=plevel(idx,patients.length);
    return `<div class="prow"><span class="rank-badge" style="background:${pl.c}">${idx+1}</span>
      <div class="pav" style="background:${p.color}">${ini(p.name)}</div>
      <div class="nm"><b>${p.name}</b><span>HbA1c ${f2(p.v[0])}% · ${p.v[3]} komplikasi</span></div>
      <div class="sc"><div class="vv">${r.v.toFixed(3)}</div><span class="pchip" style="background:${pl.s};color:${pl.c}">${pl.l}</span></div></div>`;}).join('');
}
const sc=(c,s,ic,v,l)=>`<div class="stat"><div class="ic" style="background:${s};color:${c}">${ic}</div><div class="v">${v}</div><div class="l">${l}</div></div>`;

const PALETTE=['#D64545','#E08A2B','#3E9D6E','#2E6BB0','#7A52B0','#0E7C6B','#C9A227','#B0527A','#527AB0','#5BA199'];
function rData(){
  document.getElementById('mEdit').innerHTML=patients.map((p,i)=>`
   <div class="editrow"><div class="top">
     <div class="pav" style="width:34px;height:34px;font-size:12px;background:${p.color}">${ini(p.name)}</div>
     <div class="nm" style="flex:1"><input type="text" value="${p.name}" oninput="editNameM(${i},this.value)" style="font-size:13px;font-weight:600;font-family:'Plus Jakarta Sans';border:1px solid var(--line);background:var(--surface-2);border-radius:8px;padding:5px 8px;width:100%;color:var(--ink)">
       <span style="font-size:10px;color:var(--ink-3);padding-left:2px">${p.id} · ${p.meta}</span></div>
     ${patients.length>1?`<button onclick="removePatientM(${i})" style="background:none;border:none;color:var(--p1);padding:6px;border-radius:8px" title="Hapus"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m2 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M10 11v6M14 11v6"/></svg></button>`:''}</div>
     <div class="grid">
       ${CRIT.map((c,j)=>`<div class="fld"><label>${c.code} · ${c.name} (${c.unit})</label>
         <input type="number" step="0.1" value="${p.v[j]}" oninput="edit(${i},${j},this.value)"></div>`).join('')}
     </div></div>`).join('');
}
function edit(i,j,val){const v=parseFloat(val);if(!isNaN(v)){patients[i].v[j]=v;rDash();rHasil();rCompare();}}
function editNameM(i,val){patients[i].name=val||'Pasien';rDash();rHasil();rCompare();}
function addPatientM(){
  const used=patients.map(p=>p.id);let k=1;while(used.includes('A'+k))k++;
  patients.push({id:'A'+k,name:'Pasien Baru '+k,meta:'— th · RM ----',
    color:PALETTE[patients.length%PALETTE.length],v:[8.0,170,140,1,3]});
  rData();rDash();rHasil();rCompare();
  document.getElementById('abSub').textContent=`${patients.length} alternatif × ${CRIT.length} kriteria`;
  setTimeout(()=>{const rows=document.querySelectorAll('#mEdit .editrow');const last=rows[rows.length-1];if(last){last.scrollIntoView({behavior:'smooth',block:'center'});const t=last.querySelector('input[type=text]');t.focus();t.select();}},120);
}
function removePatientM(i){patients.splice(i,1);rData();rDash();rHasil();rCompare();document.getElementById('abSub').textContent=`${patients.length} alternatif × ${CRIT.length} kriteria`;}

function rKrit(){
  const w=W();const cols=['#0E7C6B','#2E6BB0','#E08A2B','#7A52B0','#D64545'];
  document.getElementById('mKrit').innerHTML=CRIT.map((c,j)=>`
   <div class="wrow"><div class="top">
     <div style="display:flex;align-items:center;gap:8px"><span class="tag ${c.type=='benefit'?'b':'c'}">${c.code}</span>
       <b style="font-size:13px;font-family:'Plus Jakarta Sans'">${c.name}</b></div>
     <div class="mono" style="font-size:15px;font-weight:600;color:var(--teal-d)">${f2(w[j])}</div></div>
     <div style="font-size:10.5px;color:var(--ink-3);margin-bottom:2px">${c.desc} · <span class="tag ${c.type=='benefit'?'b':'c'}">${c.type}</span></div>
     <input type="range" min="1" max="30" value="${Math.round(c.w*100)}" oninput="setW(${j},this.value)">
   </div>`).join('');
}
function setW(j,v){CRIT[j].w=(+v)/100;rDash();rKrit();rHasil();rCompare();}

let method='saw';
function rHasil(){
  const d=method=='saw'?SAW():TOPSIS();const rk=rank(d.V);const w=patients[rk[0].i];
  document.getElementById('mWinner').innerHTML=`<div class="winner">
    <div class="pav">${ini(w.name)}</div>
    <div><b>#1 · ${w.name}</b><span>Prioritas penanganan utama</span></div>
    <div class="v"><div class="big">${rk[0].v.toFixed(2)}</div><small>nilai V</small></div></div>`;
  document.getElementById('mSteps').innerHTML=method=='saw'?sawHTML(d,rk):topHTML(d,rk);
}
function miniMat(title,M,rl){return `<div class="card" style="padding:13px 14px;margin-bottom:12px">
  <div style="font-size:12px;font-weight:700;font-family:'Plus Jakarta Sans';margin-bottom:9px">${title}</div>
  <table class="mtbl"><thead><tr><th>Alt</th>${CRIT.map(c=>`<th>${c.code}</th>`).join('')}</tr></thead><tbody>
  ${M.map((r,i)=>`<tr><td>${rl[i]}</td>${r.map(v=>`<td>${f2(v)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;}
function sawHTML(d,rk){const rl=patients.map(p=>p.id);
  let h=`<div class="card" style="padding:14px;margin-bottom:12px">
    <div class="steplead"><span class="n">1</span>Normalisasi</div>
    <div class="formula">r<sub>ij</sub>=x<sub>ij</sub>/max <span class="c">(benefit)</span> · r<sub>ij</sub>=min/x<sub>ij</sub> <span class="c">(cost)</span></div></div>`;
  h+=miniMat('Matriks ternormalisasi (R)',d.R,rl);
  h+=`<div class="card" style="padding:14px;margin-bottom:12px"><div class="steplead"><span class="n">2</span>Perankingan</div>
    <div class="formula">V<sub>i</sub> = Σ ( w<sub>j</sub> · r<sub>ij</sub> )</div></div>`;
  h+=rankList(rk,'V');return h;
}
function topHTML(d,rk){const rl=patients.map(p=>p.id);
  let h=`<div class="card" style="padding:14px;margin-bottom:12px"><div class="steplead"><span class="n">1</span>Normalisasi vektor</div>
    <div class="formula">r<sub>ij</sub> = x<sub>ij</sub> / √Σx<sub>ij</sub>²</div></div>`;
  h+=miniMat('Matriks terbobot (Y)',d.Y,rl);
  h+=`<div class="card" style="padding:14px;margin-bottom:12px"><div class="steplead"><span class="n">2-3</span>Solusi ideal A⁺ / A⁻</div>
    <table class="mtbl"><thead><tr><th>—</th>${CRIT.map(c=>`<th>${c.code}</th>`).join('')}</tr></thead><tbody>
    <tr><td style="color:var(--teal-d)">A⁺</td>${d.Ap.map(v=>`<td style="color:var(--teal-d)">${f2(v)}</td>`).join('')}</tr>
    <tr><td style="color:var(--p1)">A⁻</td>${d.Am.map(v=>`<td style="color:var(--p1)">${f2(v)}</td>`).join('')}</tr></tbody></table></div>`;
  h+=`<div class="card" style="padding:14px;margin-bottom:12px"><div class="steplead"><span class="n">4-5</span>Jarak &amp; preferensi</div>
    <div class="formula">V<sub>i</sub> = D⁻ / (D⁺ + D⁻)</div></div>`;
  h+=rankList(rk,'V');return h;
}
function rankList(rk,lbl){
  return `<div class="card">${rk.map((r,idx)=>{const p=patients[r.i],pl=plevel(idx,patients.length);
    return `<div class="prow"><span class="rank-badge" style="background:${pl.c}">${idx+1}</span>
      <div class="pav" style="width:34px;height:34px;font-size:12px;background:${p.color}">${ini(p.name)}</div>
      <div class="nm"><b style="font-size:13px">${p.name}</b><span>${pl.l}</span></div>
      <div class="sc"><div class="vv" style="color:var(--teal-d)">${r.v.toFixed(4)}</div></div></div>`;}).join('')}</div>`;
}
function rCompare(){
  const s=SAW(),t=TOPSIS(),rs=rank(s.V),rt=rank(t.V);
  const pS={},pT={};rs.forEach((r,i)=>pS[r.i]=i+1);rt.forEach((r,i)=>pT[r.i]=i+1);
  const sameTop=rs[0].i===rt[0].i;let agree=0;patients.forEach((_,i)=>{if(pS[i]==pT[i])agree++;});
  const rows=patients.map((p,i)=>({i,p,rs:pS[i],rt:pT[i],vs:s.V[i],vt:t.V[i]})).sort((a,b)=>a.rt-b.rt);
  let h=`<div class="statgrid" style="margin-bottom:14px">
    ${sc('var(--teal)','var(--teal-soft)',iC,agree+'/'+patients.length,'Peringkat identik')}
    ${sc(sameTop?'var(--p4)':'var(--p2)',sameTop?'var(--p4-soft)':'var(--p2-soft)',iA,sameTop?'Sama':'Beda','Pemenang #1')}</div>
  <div class="card" style="margin-bottom:14px"><div style="padding:13px 14px 4px;font-size:13px;font-weight:700;font-family:'Plus Jakarta Sans'">Perbandingan Peringkat</div>
   <table class="mtbl" style="padding:0 6px"><thead><tr><th style="padding-left:14px">Pasien</th><th>SAW</th><th>TOPSIS</th><th style="padding-right:14px">Geser</th></tr></thead><tbody>
   ${rows.map(r=>{const diff=r.rs-r.rt;return `<tr><td style="padding-left:14px">${r.p.id}</td>
     <td>#${r.rs}</td><td>#${r.rt}</td><td style="padding-right:14px;color:${diff==0?'var(--p4)':'var(--p2)'}">${diff==0?'—':(diff>0?'▲':'▼')+Math.abs(diff)}</td></tr>`;}).join('')}
   </tbody></table></div>
   <div class="note" style="background:var(--teal-soft);border-color:#BFE3DA;color:var(--teal-d)">
     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4M12 2a7 7 0 00-4 12.7c.6.5 1 1.3 1 2.1h6c0-.8.4-1.6 1-2.1A7 7 0 0012 2z"/></svg>
     <div><b>Rekomendasi:</b> ${sameTop?`kedua metode sepakat memilih <b>${patients[rs[0].i].name}</b> sebagai prioritas utama.`:`SAW memilih <b>${patients[rs[0].i].name}</b>, TOPSIS memilih <b>${patients[rt[0].i].name}</b>. Sistem menyarankan <b>${patients[rt[0].i].name}</b> (profil risiko paling seimbang).`}</div>
   </div>`;
  document.getElementById('mCompare').innerHTML=h;
}

/* ===== nav ===== */
const BAR={dash:['Program Prolanis','Prioritas Pasien','Diabetes Melitus Tipe 2'],
  data:['Matriks Keputusan','Data Pasien','5 alternatif × 5 kriteria'],
  krit:['Bobot Preferensi','Kriteria & Bobot','Total bobot = 1,00'],
  hasil:['Langkah MADM','Hasil Perankingan','SAW & TOPSIS'],
  banding:['Validasi Keputusan','SAW vs TOPSIS','Perbandingan metode']};
function mgo(pg){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('v-'+pg).classList.add('on');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.pg===pg));
  const b=BAR[pg];document.getElementById('abEyebrow').textContent=b[0];
  document.getElementById('abTitle').textContent=b[1];
  document.getElementById('abSub').textContent = pg==='data' ? `${patients.length} alternatif × ${CRIT.length} kriteria` : b[2];
  document.getElementById('body').scrollTop=0;
}
document.querySelectorAll('.tab[data-pg]').forEach(t=>t.onclick=()=>mgo(t.dataset.pg));
document.querySelectorAll('#mSeg button').forEach(b=>b.onclick=()=>{method=b.dataset.m;
  document.querySelectorAll('#mSeg button').forEach(x=>x.classList.toggle('on',x===b));rHasil();});
rDash();rData();rKrit();rHasil();rCompare();
</script>
</body>
</html>
